services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - SERVER_COUNTRIES=${MULLVAD_COUNTRY}
      - FIREWALL_OUTBOUND_SUBNETS=172.29.0.0/24
      - DNS_UPSTREAM_RESOLVER_TYPE=plain
      - DNS_UPSTREAM_PLAIN_ADDRESSES=172.29.0.30:53
      - DNS_REBINDING_PROTECTION_EXEMPT_HOSTNAMES=${VPN_DNS_DOMAINS}
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.tcp_rmem=4096 262144 16777216
      - net.ipv4.tcp_wmem=4096 262144 16777216
    ports:
      - "41642:41642/udp"
    networks:
      bridge_vpn:
        ipv4_address: 172.29.0.10
    volumes:
      - ./gluetun/post-rules.txt:/iptables/post-rules.txt
      - ./gluetun/auth:/gluetun/auth:ro
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://127.0.0.1:9999/v1/publicip/ip"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  route-init:
    build:
      context: ./gluetun
      dockerfile: Dockerfile.route-init
    container_name: route-init
    network_mode: service:gluetun
    cap_add:
      - NET_ADMIN
    volumes:
      - shared-config:/shared
      - ./vpn-instances.json:/shared/vpn-instances.json:ro
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:v1.92.5
    container_name: tailscale
    network_mode: service:gluetun
    cap_add:
      - NET_ADMIN
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_HOSTNAME=${TS_HOSTNAME}
      - TS_EXTRA_ARGS=--advertise-exit-node --advertise-routes=${VPN_ADVERTISE_ROUTES} --login-server=${HEADSCALE_URL}
      - TS_USERSPACE=false
      - TS_AUTH_ONCE=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=false
      - TS_NO_LOGS_NO_SUPPORT=true
      - TS_TAILSCALED_EXTRA_ARGS=--port=41642
    volumes:
      - ts-state:/var/lib/tailscale
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  dnsmasq:
    build: ./dns
    container_name: dnsmasq
    cap_add:
      - NET_ADMIN
    networks:
      bridge_vpn:
        ipv4_address: 172.29.0.30
    volumes:
      - shared-config:/shared
      - ./vpn-instances.json:/shared/vpn-instances.json:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "dig @127.0.0.1 example.com +short +time=2 +tries=1 >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command: serve
    network_mode: service:gluetun
    volumes:
      - ntfy-cache:/var/cache/ntfy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  healthcheck:
    build: ./healthcheck
    container_name: healthcheck
    network_mode: service:gluetun
    volumes:
      - shared-config:/shared:ro
      - ./vpn-instances.json:/shared/vpn-instances.json:ro
      - healthcheck-state:/state
    environment:
      - VPS_PUBLIC_IP=${VPS_PUBLIC_IP}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-30}
      - NTFY_TOPIC=${NTFY_TOPIC:-vpn-alerts}
    depends_on:
      gluetun:
        condition: service_healthy
      ntfy:
        condition: service_healthy
    restart: unless-stopped

  mullvad-switcher:
    build: ./switcher
    container_name: mullvad-switcher
    networks:
      bridge_vpn:
        ipv4_address: 172.29.0.40
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - switcher-data:/data
      - ${COMPOSE_PROJECT_DIR}:${COMPOSE_PROJECT_DIR}:ro
    environment:
      - NTFY_CMD_TOPIC=${NTFY_CMD_TOPIC:-vpn-cmd}
      - COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME:-vpn}
      - COMPOSE_PROJECT_DIR=${COMPOSE_PROJECT_DIR}
    depends_on:
      gluetun:
        condition: service_healthy
    restart: unless-stopped

  vpn-bot:
    build: ./bot
    container_name: vpn-bot
    network_mode: service:gluetun
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - switcher-data:/data
      - shared-config:/shared:ro
      - ./vpn-instances.json:/shared/vpn-instances.json:ro
    environment:
      - NTFY_CMD_TOPIC=${NTFY_CMD_TOPIC:-vpn-cmd}
      - NTFY_TOPIC=${NTFY_TOPIC:-vpn-alerts}
      - VPS_PUBLIC_IP=${VPS_PUBLIC_IP}
      - GLUETUN_API_KEY=${GLUETUN_API_KEY}
    depends_on:
      gluetun:
        condition: service_healthy
      ntfy:
        condition: service_healthy
    restart: unless-stopped

  ts-test-client:
    image: tailscale/tailscale
    container_name: ts-test-client
    cap_add:
      - NET_ADMIN
    dns:
      - 172.29.0.10
    environment:
      - TS_AUTHKEY=${TS_TEST_CLIENT_AUTHKEY}
      - TS_HOSTNAME=vpn-test-client
      - TS_EXTRA_ARGS=--login-server=${HEADSCALE_URL} --accept-routes --reset
      - TS_USERSPACE=false
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ACCEPT_DNS=false
    volumes:
      - ts-test-state:/var/lib/tailscale
    networks:
      bridge_vpn:
        ipv4_address: 172.29.0.50
    depends_on:
      gluetun:
        condition: service_healthy
      dnsmasq:
        condition: service_healthy
    restart: "no"
    profiles:
      - test

networks:
  bridge_vpn:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24

volumes:
  ts-state:
  ts-test-state:
  ntfy-cache:
  shared-config:
  healthcheck-state:
  switcher-data:
